services:
  mariadb:
    image: mariadb
    build:
      context: ./requirements/mariadb
      args:
        MARIADB_PORT: ${MARIADB_PORT}
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${MARIADB_PORT}"
    networks:
      - inception
    volumes:
      - mariadb_data:/var/lib/mysql

  nginx:
    image: nginx
    build:
      context: ./requirements/nginx
      args:
        NGINX_PORT: ${NGINX_PORT}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress

  wordpress:
    image: wordpress
    build:
      context: ./requirements/wordpress
      args:
        PHP_FPM_PORT: ${PHP_FPM_PORT}
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${PHP_FPM_PORT}"
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - mariadb

networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    name: mariadb_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jpaulis/data/mariadb
  wordpress_data:
    name: wordpress_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jpaulis/data/wordpress
